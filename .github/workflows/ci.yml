name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/bootstrap-framework

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: interview_scheduler_cn
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/interview_scheduler_cn?schema=public
      ADMIN_BOOTSTRAP_EMAIL: admin@example.com
      ADMIN_BOOTSTRAP_PASSWORD: ChangeMe_StrongPassword_123!
      ADMIN_BOOTSTRAP_NAME: 超级管理员
      SESSION_TTL_DAYS: "7"
      APP_URL: https://ci.example.test/when2entretien
      NEXT_PUBLIC_BASE_PATH: /when2entretien
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm exec prisma migrate deploy
      - run: pnpm check

  business-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: interview_scheduler_cn
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/interview_scheduler_cn?schema=public
      ADMIN_BOOTSTRAP_EMAIL: admin@example.com
      ADMIN_BOOTSTRAP_PASSWORD: ChangeMe_StrongPassword_123!
      ADMIN_BOOTSTRAP_NAME: 超级管理员
      SESSION_TTL_DAYS: "7"
      WHEN2ENTRETIEN_ALLOW_E2E_MUTATION: "1"
      PLAYWRIGHT_WORKERS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm exec prisma migrate deploy
      - run: pnpm exec playwright install chromium
      - run: >-
          pnpm exec playwright test
          tests/e2e/business-flow.spec.ts
          tests/e2e/candidate-auth-security.spec.ts
          tests/e2e/scheduling-integrity.spec.ts
          tests/e2e/email-ops.spec.ts
          tests/e2e/slot-clear.spec.ts
          tests/e2e/timezone-switch.spec.ts
          --project=chromium --workers=1
